version: 2.1

jobs:
  tasks-python-tests:
    docker:
      - image: cimg/python:3.12
    working_directory: ~/project/clickup-tasks-python
    steps:
      - checkout:
          path: ~/project
      - run: pip install -r requirements.txt
      - run:
          name: Run pytest (Tasks)
          command: pytest

  tasks-postman-tests:
    docker:
      - image: cimg/node:20.11
    working_directory: ~/project
    steps:
      - checkout
      - run:
          name: Install Newman
          command: npm install newman newman-reporter-htmlextra
      - run:
          name: Run Newman (Tasks)
          command: >
            ./node_modules/.bin/newman run "ClickUp Tasks API.postman_collection.json"
            --env-var "token=$CLICKUP_TOKEN"
            --env-var "list_id=$CLICKUP_LIST_ID"
            --env-var "base_url=https://api.clickup.com/api/v2"
            -r htmlextra

  tasks-cypress-tests:
    docker:
      - image: cypress/included:13.13.0
    working_directory: ~/project/clickup-tasks-cypress
    environment:
      CYPRESS_token: $CLICKUP_TOKEN
      CYPRESS_listId: $CLICKUP_LIST_ID
    steps:
      - checkout:
          path: ~/project
      - run:
          name: Install dependencies
          command: npm install
      - run:
          name: Install Cypress binary
          command: npx cypress install
      - run:
          name: Run Cypress (Tasks)
          command: npx cypress run

workflows:
  all-tests:
    jobs:
      - tasks-python-tests
      - tasks-postman-tests
      - tasks-cypress-tests
